variables:
  mtx: 'datasets/matrices_list_mtx.txt'
  perm: 
    - random1D
    - SB_degree
    - SB_gray
  block_size:
    - 32
  n_cols:
    - 32
    - 256
    - 1024

preprocess: |
  source ~/.venv/bin/activate
  mtx_name=$(basename {mtx} .mtx)
  module load CUDA/
  module load GCC/13.3.0

jobs:
  - config: "gpu"
    config_jobs:

      - tag: "ASPT_SPMM_ROW"
        command: "python3 operators/aspt_spmm.py {mtx} --perm perms/{perm}/$mtx_name.perm --perm-type ROW --n-cols {n_cols}"

#      - tag: "CUSPARSE_SPMV_BSR_ROW"
#        command: "python3 operators/cusparse_bsr_spmv.py {mtx} --perm perms/{perm}/$mtx_name.perm --blocksize {block_size} --perm-type ROW"
#      - tag: "CUSPARSE_SPMV_CSR_ROW"
#        command: "python3 operators/cusparse_csr_spmv.py {mtx} --perm perms/{perm}/$mtx_name.perm --perm-type ROW"

      - tag: "CUSPARSE_SPMM_BSR_ROW"
        command: "python3 operators/cusparse_bsr_spmm.py {mtx} --perm perms/{perm}/$mtx_name.perm --blocksize {block_size} --perm-type ROW --n-cols {n_cols}"
      - tag: "CUSPARSE_SPMM_CSR_ROW"
        command: "python3 operators/cusparse_csr_spmm.py {mtx} --perm perms/{perm}/$mtx_name.perm --perm-type ROW --n-cols {n_cols}"

      - tag: "SMAT_SPMM_ROW"
        command: "python3 operators/smat_spmm.py {mtx} --perm perms/{perm}/$mtx_name.perm --blocksize {block_size} --perm-type ROW --n-cols {n_cols}"