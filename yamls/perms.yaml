variables:
  mtx: 'datasets/matrices_list_mtx.txt'  

jobs:
  - config: "perm"
    config_jobs:

      - tag: "GraphBLAS"
        preprocess: |
          source ~/.venv/bin/activate
          mtx_name=$(basename {mtx} .mtx)
          mkdir -p perms/graphblas
          perm_path=perms/graphblas/$mtx_name.perm
        command: "python3 MtxPerm/random_permutation_graphblas.py {mtx} --output $perm_path"

      # - tag: "RabbitOrder"
      #  command: "rabbit_order/rabbit_order {mtx} {rabbit_flag}"
