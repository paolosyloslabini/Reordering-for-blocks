variables:
  mtx: 'datasets/matrices_list_mtx.txt'
  block_size:
    - 32
  n_cols:
    - 32
    - 256
    - 1024

preprocess: |
  source ~/.venv/bin/activate
  mtx_name=$(basename {mtx} .mtx)
  module load CUDA/
  module load GCC/13.3.0

jobs:
  - config: "gpu"
    config_jobs:

      - tag: "ASPT_SPMM_NO_REORDER"
        command: "python3 operators/aspt_spmm.py {mtx} --n-cols {n_cols}"

#      - tag: "CUSPARSE_SPMV_BSR_NO_REORDER"
#        command: "python3 operators/cusparse_bsr_spmv.py {mtx} --blocksize {block_size}"
#      - tag: "CUSPARSE_SPMV_CSR_NO_REORDER"
#        command: "python3 operators/cusparse_csr_spmv.py {mtx}"

      - tag: "CUSPARSE_SPMM_BSR_NO_REORDER"
        command: "python3 operators/cusparse_bsr_spmm.py {mtx} --blocksize {block_size} --n-cols {n_cols}"
      - tag: "CUSPARSE_SPMM_CSR_NO_REORDER"
        command: "python3 operators/cusparse_csr_spmm.py {mtx} --n-cols {n_cols}"

      - tag: "SMAT_SPMM_NO_REORDER"
        command: "python3 operators/smat_spmm.py {mtx} --blocksize {block_size} --n-cols {n_cols}"
