variables:
  mtx: 'datasets/matrices_list_filtered.txt'
preprocess: |
  source ~/.venv/bin/activate

jobs:
  - config: "perm"
    config_jobs:

      - tag: "GROOT_reorder_RANDOM"
        preprocess: |
          source MtxPerm/GROOT/groot_preprocess.sh
          mtx_name=$(basename {mtx} .mtx)
          mkdir -p perms_random/GROOT_reorder
          perm_path=perms_random/GROOT_reorder/$mtx_name.perm
        command: >
          temp_mtx=$(mktemp /tmp/pre_perm_XXXXXX.mtx) &&
          python3 MtxPerm/pre_permute.py {mtx} $temp_mtx
          --perm perms/random1D/$mtx_name.perm --perm-type SYMMETRIC &&
          python3 MtxPerm/GROOT/reorder.py $temp_mtx $perm_path;
          rm -f $temp_mtx

  - config: "perm"
    config_jobs:

      - tag: "random1D_RANDOM"
