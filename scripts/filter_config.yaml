# ===========================================================================
# Centralized Filter Configuration
# ===========================================================================
# All plotting and table scripts read this file.
#
# CLI flags (--one-per-family, --include-rectangular, etc.) are still
# accepted but they OVERRIDE values from this file. When no CLI flag is
# given, the value below is used.
# ===========================================================================

# ---- Data Paths -----------------------------------------------------------
data:
  operations_csv: "results/results_operations.csv"
  analysis_csv: "results/results_analysis.csv"
  reordering_csv: "results/results_reordering.csv"
  matrices_list: "datasets/matrices_list_mtx.txt"

# ---- Filtering ------------------------------------------------------------
filters:
  # Keep only one matrix per SuiteSparse family (reduces redundancy).
  one_per_family: true

  # Keep only square matrices (rows == cols).
  square_only: true

  # Minimum number of rows. Set to null to disable.
  min_size: 0

  # Maximum number of rows or columns. Matrices exceeding this in
  # either dimension are removed. Set to null to disable.
  max_size: 1000000

  # Remove matrices whose original bandwidth is below this threshold
  # (trivially banded). Set to null to disable.
  min_bandwidth: 2          # e.g. 5

  # Remove very sparse matrices where nnz < factor * rows.
  # Set to null to disable.
  max_sparsity_factor: 1.5       # 2

  # Remove purely diagonal matrices (nnz == rows for square matrices).
  filter_diagonal: true

  # Families to keep fully (not reduce to one representative).
  # These contain diverse, non-duplicate matrices commonly used in sparse
  # matrix research. Set to [] to disable.
  keep_full_families:
    - DIMACS10     # Graph challenge benchmarks
    - SNAP         # Stanford social/web networks
    - LAW          # Web graphs (Laboratory for Web Algorithmics)
    - Newman       # Network science graphs
    - Gleich       # Web and social network graphs
    - Janna        # Large-scale FEM problems
    - Norris       # Structural engineering benchmarks
    - vanHeukelum  # Cage graphs, unique structure
