# ===========================================================================
# Centralized Filter Configuration — RANDOM pipeline
# ===========================================================================
# Same filters as filter_config.yaml, but pointing to the random-scrambled
# result CSVs produced by parse_results.py.
#
# Used automatically when running plot scripts with --random.
# ===========================================================================

# ---- Data Paths -----------------------------------------------------------
data:
  operations_csv: "results/results_operations_random.csv"
  analysis_csv: "results/results_analysis_random.csv"
  reordering_csv: "results/results_reordering_random.csv"
  matrices_list: "datasets/matrices_list_filtered.txt"

# ---- Filtering ------------------------------------------------------------
filters:
  one_per_family: true
  square_only: true
  min_size: 0
  max_size: null
  min_bandwidth: 2
  max_sparsity_factor: 1.5
  filter_diagonal: true
  keep_full_families:
    - DIMACS10
    - SNAP
    - LAW
    - Newman
    - Gleich
    - Janna
    - Norris
    - vanHeukelum

# ---- Display / Analysis Settings ------------------------------------------
display:
  correlation_method: pearson
